name: Save Comment
on:
  repository_dispatch:
    types: [new-comment]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Add Comment to JSON
        run: |
          # This writes the actual data as a JSON string to a temporary file
          cat << 'EOF' > new_comment.json
          ${{ toJson(github.event.client_payload.data) }}
          EOF

          # This uses jq to merge the new comment into your existing list
          jq '. += [input]' comments.json new_comment.json > updated_comments.json
          mv updated_comments.json comments.json
          rm new_comment.json

      - name: Commit and Push
        run: |
          git config user.name "CommentBot"
          git config user.email "bot@neocities.org"
          git add comments.json
          git commit -m "New comment for ${{ github.event.client_payload.data.postID }}"
          git push

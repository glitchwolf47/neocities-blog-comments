// 1. GET THE UNIQUE ID (The filename of the current page)
const currentPostID = window.location.pathname.split("/").pop() || "home";

// 2. LOAD ONLY MATCHING COMMENTS
async function loadComments() {
    try {
        const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/comments.json?t=${new Date().getTime()}`;
        const response = await fetch(url);
        const allComments = await response.json();
        
        // FILTER: Only keep comments where the postID matches this page
        const filteredComments = allComments.filter(c => c.postID === currentPostID);
        
        const display = document.getElementById('display-comments');
        if (filteredComments.length === 0) {
            display.innerHTML = "// NO TRANSMISSIONS LOGGED FOR THIS POST.";
        } else {
            display.innerHTML = filteredComments.map(c => `
                <div style="margin-bottom: 15px; border-bottom: 1px dashed #333;">
                    <b style="color: #ff00ff;">> ${c.name}:</b>
                    <p style="margin: 5px 0; color: #eee;">${c.message}</p>
                </div>
            `).reverse().join('');
        }
    } catch (e) {
        document.getElementById('display-comments').innerHTML = "ERROR: SATELLITE OFFLINE.";
    }
}

// 3. SEND COMMENT WITH THE POST ID
